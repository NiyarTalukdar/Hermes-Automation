name: "📊 Publish Dashboard to GitHub Pages"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "scripts/fetch_apm_metrics.py"
  workflow_run:
    workflows:
      - "🚀 LoadRunner API Performance Test"
      - "🌐 LoadRunner Web HTTP/HTML Performance Test"
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: "🚀 Fetch APM Metrics + Deploy Dashboard"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch live APM metrics (Dynatrace + AppDynamics)
        run: |
          python3 scripts/fetch_apm_metrics.py \
            --dt-env-id      "${{ secrets.DT_ENVIRONMENT_ID }}" \
            --dt-token        "${{ secrets.DT_API_TOKEN }}" \
            --apd-controller  "${{ secrets.APPDYNAMICS_CONTROLLER_URL }}" \
            --apd-account     "${{ secrets.APPDYNAMICS_ACCOUNT_NAME }}" \
            --apd-api-key     "${{ secrets.APPDYNAMICS_API_KEY }}" \
            --apd-app-id      "${{ secrets.APPDYNAMICS_APP_ID }}" \
            --output          "dashboard/apm-metrics.json"
        continue-on-error: true   # dashboard still deploys even if APM is unreachable

      - name: Show fetched metrics summary
        run: |
          if [ -f dashboard/apm-metrics.json ]; then
            echo "## 📡 APM Metrics Snapshot" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat dashboard/apm-metrics.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(json.dumps({k:v for k,v in d.items() if k!='dynatrace' or True}, indent=2)[:2000])
            " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ apm-metrics.json not generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print dashboard URL
        run: |
          echo "✅ Dashboard live at: ${{ steps.deployment.outputs.page_url }}"
          echo "🔓 Public access — no login required"
          echo "📡 APM metrics embedded from Dynatrace + AppDynamics"
